<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6366f1"/>
    </marker>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#161629"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="620" fill="url(#bg)"/>

  <text x="40" y="46" font-size="22" font-weight="800" fill="#ffffff">Motor de adaptación — de una interacción a una decisión visible</text>
  <text x="40" y="70" font-size="13" fill="#9898bb">useBehaviorTracker → behavior-classifier → adaptation-rules → store → UI</text>

  <!-- Row 1: pipeline principal -->
  <g font-size="12.5">
    <!-- 1. Interacción -->
    <rect x="40" y="110" width="170" height="90" rx="12" fill="#1a1a30" stroke="#2a2a45"/>
    <text x="125" y="140" text-anchor="middle" font-size="22">🖱️</text>
    <text x="125" y="165" text-anchor="middle" fill="#ffffff" font-weight="700">Interacción</text>
    <text x="125" y="182" text-anchor="middle" fill="#9898bb" font-size="10.5">quiz, código, idle</text>

    <path d="M 210 155 L 250 155" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- 2. useBehaviorTracker -->
    <rect x="250" y="110" width="190" height="90" rx="12" fill="#1a1a30" stroke="#2a2a45"/>
    <text x="345" y="140" text-anchor="middle" font-size="22">📡</text>
    <text x="345" y="165" text-anchor="middle" fill="#ffffff" font-weight="700">useBehaviorTracker</text>
    <text x="345" y="182" text-anchor="middle" fill="#9898bb" font-size="10.5">emite un BehaviorEvent</text>

    <path d="M 440 155 L 480 155" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- 3. behavior-classifier -->
    <rect x="480" y="110" width="210" height="90" rx="12" fill="#1a1a30" stroke="#2a2a45"/>
    <text x="585" y="140" text-anchor="middle" font-size="22">🧮</text>
    <text x="585" y="165" text-anchor="middle" fill="#ffffff" font-weight="700">behavior-classifier</text>
    <text x="585" y="182" text-anchor="middle" fill="#9898bb" font-size="10.5">recalcula confidence y estado</text>

    <path d="M 690 155 L 730 155" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- 4. adaptation-rules -->
    <rect x="730" y="110" width="220" height="90" rx="12" fill="#1a1a30" stroke="#2a2a45"/>
    <text x="840" y="140" text-anchor="middle" font-size="22">⚖️</text>
    <text x="840" y="165" text-anchor="middle" fill="#ffffff" font-weight="700">adaptation-rules</text>
    <text x="840" y="182" text-anchor="middle" fill="#9898bb" font-size="10.5">evalúa 8 reglas por prioridad</text>

    <path d="M 950 155 L 990 155" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- 5. AdaptationDecision -->
    <rect x="990" y="110" width="170" height="90" rx="12" fill="#232350" stroke="#6366f1" stroke-width="1.5"/>
    <text x="1075" y="140" text-anchor="middle" font-size="22">🎯</text>
    <text x="1075" y="165" text-anchor="middle" fill="#ffffff" font-weight="700">Decisión</text>
    <text x="1075" y="182" text-anchor="middle" fill="#a5a5f0" font-size="10.5">mayor prioridad gana</text>
  </g>

  <!-- Bajada al store -->
  <path d="M 1075 200 L 1075 260 L 345 260 L 345 300" stroke="#6366f1" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <rect x="250" y="300" width="190" height="70" rx="12" fill="#1a1a30" stroke="#2a2a45"/>
  <text x="345" y="330" text-anchor="middle" font-size="20">💾</text>
  <text x="345" y="352" text-anchor="middle" fill="#ffffff" font-weight="700" font-size="12.5">useAppStore</text>
  <text x="345" y="365" text-anchor="middle" fill="#9898bb" font-size="10">latestDecision + cooldowns</text>

  <!-- Store -> 4 consumidores UI -->
  <path d="M 345 370 L 345 410" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 345 410 L 130 410 L 130 450" stroke="#6366f1" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 345 410 L 345 450" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 345 410 L 585 410 L 585 450" stroke="#6366f1" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 345 410 L 850 410 L 850 450" stroke="#6366f1" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <g font-size="11">
    <rect x="40" y="450" width="180" height="80" rx="12" fill="#1a1a30" stroke="#2a2a45"/>
    <text x="130" y="478" text-anchor="middle" font-size="20">🔀</text>
    <text x="130" y="500" text-anchor="middle" fill="#ffffff" font-weight="700">contentVariant</text>
    <text x="130" y="516" text-anchor="middle" fill="#9898bb" font-size="10">simplified / base / advanced</text>

    <rect x="255" y="450" width="180" height="80" rx="12" fill="#1a1a30" stroke="#2a2a45"/>
    <text x="345" y="478" text-anchor="middle" font-size="20">💡</text>
    <text x="345" y="500" text-anchor="middle" fill="#ffffff" font-weight="700">HintOverlay</text>
    <text x="345" y="516" text-anchor="middle" fill="#9898bb" font-size="10">pista contextual</text>

    <rect x="495" y="450" width="180" height="80" rx="12" fill="#1a1a30" stroke="#2a2a45"/>
    <text x="585" y="478" text-anchor="middle" font-size="20">🤖</text>
    <text x="585" y="500" text-anchor="middle" fill="#ffffff" font-weight="700">AIExplanation</text>
    <text x="585" y="516" text-anchor="middle" fill="#9898bb" font-size="10">explicación alternativa</text>

    <rect x="760" y="450" width="200" height="80" rx="12" fill="#1a1a30" stroke="#2a2a45"/>
    <text x="860" y="478" text-anchor="middle" font-size="20">🔍</text>
    <text x="860" y="500" text-anchor="middle" fill="#ffffff" font-weight="700">TransparencyPanel</text>
    <text x="860" y="516" text-anchor="middle" fill="#9898bb" font-size="10">por qué se tomó la decisión</text>
  </g>

  <!-- Nota lateral -->
  <rect x="1000" y="230" width="160" height="220" rx="12" fill="none" stroke="#2a2a45" stroke-dasharray="4 3"/>
  <text x="1080" y="255" text-anchor="middle" fill="#f97316" font-size="11.5" font-weight="700">Bug corregido</text>
  <text x="1015" y="278" fill="#c9c9de" font-size="10.5">Antes: cada decisión</text>
  <text x="1015" y="293" fill="#c9c9de" font-size="10.5">sobreescribía a la</text>
  <text x="1015" y="308" fill="#c9c9de" font-size="10.5">anterior sin importar</text>
  <text x="1015" y="323" fill="#c9c9de" font-size="10.5">prioridad → ganaba</text>
  <text x="1015" y="338" fill="#c9c9de" font-size="10.5">la última procesada,</text>
  <text x="1015" y="353" fill="#c9c9de" font-size="10.5">no la más importante.</text>
  <text x="1015" y="378" fill="#4ade80" font-size="10.5" font-weight="700">Ahora: solo la de</text>
  <text x="1015" y="393" fill="#4ade80" font-size="10.5">mayor prioridad del</text>
  <text x="1015" y="408" fill="#4ade80" font-size="10.5">lote se activa.</text>

  <text x="600" y="590" text-anchor="middle" fill="#6e6e8a" font-size="11">
    Todo el motor (behavior-classifier.ts + adaptation-rules.ts) es agnóstico al contenido — por eso sirve tanto para el track de JavaScript como el de TypeScript.
  </text>
</svg>
